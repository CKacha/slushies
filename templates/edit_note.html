{% extends "base.html" %}

{% block title %}Edit Note - SlushNotes{% endblock %}

{% block content %}
<section class="form-card">
  <h1>Edit Note</h1>

  <form method="POST">
    <div>
      <label for="title">Title</label>
      <input id="title" name="title" type="text" value="{{ note['title'] }}">
    </div>

    <div>
      <label for="content">Content</label>
      <textarea id="content" name="content">{{ note["content"] }}</textarea>
    </div>

    <div class="note-actions">
      <button type="submit">Save Changes</button>
      <a class="button-secondary" href="{{ url_for('notes') }}">Back</a>
    </div>
  </form>
</section>
{% endblock %}
